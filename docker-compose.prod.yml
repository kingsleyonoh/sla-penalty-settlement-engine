services:
  slapen:
    image: ghcr.io/kingsleyonoh/sla-penalty-settlement-engine:latest
    container_name: slapen
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5109/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.slapen.rule=Host(`slapen.kingsleyonoh.com`)"
      - "traefik.http.routers.slapen.entrypoints=websecure"
      - "traefik.http.routers.slapen.tls.certresolver=letsencrypt"
      - "traefik.http.services.slapen.loadbalancer.server.port=5109"
    networks:
      - traefik-public
      - ecosystem

networks:
  traefik-public:
    external: true
  ecosystem:
    external: true
