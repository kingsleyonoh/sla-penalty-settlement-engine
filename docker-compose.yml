services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slapen
      POSTGRES_USER: slapen
      POSTGRES_PASSWORD: slapen
    ports:
      - "5432:5432"
    volumes:
      - slapen-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  slapen-postgres:
